ai_usage_summary: |
  Used Gemini (Antigravity AI coding assistant) for architecture design, implementing data structures, and code generation.
  All candidate parsing and logical scoring rule logic were developed and tested locally. No candidate data was sent to external APIs.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based candidate retrieval and ranking engine designed for high throughput and precision.
  The engine filters out all impossible honeypots (future dates, duration contradictions, assessment skill mismatches) and blacklists service-only companies and non-matching titles to eliminate keyword stuffers.
  Candidates are ranked based on a composite score representing role relevance, technical skills match (vector search, embeddings, NLP), experience match (bell curve around 6-8 years), and behavioral signals (recruiter response rate, notice period).
  Reasoning descriptions are programmatically compiled using specific facts from each candidate's profile.

